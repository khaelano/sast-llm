rules:
  # ============================================================
  # SQL INJECTION RULES
  # ============================================================
  
  - id: sql-injection-string-concat
    patterns:
      - pattern: |
          $CURSOR.execute("..." + $INPUT)
      - pattern: |
          $CURSOR.execute(f"...{$INPUT}...")
      - pattern: |
          $CURSOR.execute("...".format(...))
      - pattern: |
          $CURSOR.execute("..." % ...)
    message: |
      SQL Injection terdeteksi: Input pengguna digabungkan langsung ke dalam query SQL.
      Gunakan parameterized queries dengan placeholder (?) atau (%s).
      Referensi: CWE-89, OWASP A03:2021
    languages: [python]
    severity: ERROR
    metadata:
      owasp: "A03:2021 - Injection"
      cwe: "CWE-89"
      category: SQL Injection
      confidence: HIGH

  - id: sql-injection-f-string
    pattern: |
      $CURSOR.execute(f"... {$VAR} ...")
    message: |
      SQL Injection: f-string digunakan dalam query SQL.
      Gunakan parameterized queries: cursor.execute("... WHERE id = ?", (user_id,))
    languages: [python]
    severity: ERROR
    metadata:
      owasp: "A03:2021 - Injection"
      cwe: "CWE-89"

  # ============================================================
  # COMMAND INJECTION RULES
  # ============================================================

  - id: command-injection-os-system
    patterns:
      - pattern: os.system($CMD + ...)
      - pattern: os.system(f"...{$VAR}...")
      - pattern: os.system("...".format(...))
    message: |
      Command Injection: os.system() dengan input yang tidak tervalidasi.
      Gunakan subprocess.run() dengan argument list (tanpa shell=True).
      Referensi: CWE-78
    languages: [python]
    severity: ERROR
    metadata:
      owasp: "A03:2021 - Injection"
      cwe: "CWE-78"

  - id: command-injection-subprocess-shell-true
    patterns:
      - pattern: subprocess.run($CMD, ..., shell=True, ...)
      - pattern: subprocess.Popen($CMD, ..., shell=True, ...)
      - pattern: subprocess.call($CMD, ..., shell=True, ...)
      - pattern: subprocess.check_output($CMD, ..., shell=True, ...)
    message: |
      Command Injection: subprocess dengan shell=True memungkinkan shell injection.
      Gunakan argument list dan hapus shell=True:
      subprocess.run(["ping", "-c", "4", hostname], capture_output=True)
    languages: [python]
    severity: WARNING
    metadata:
      owasp: "A03:2021 - Injection"
      cwe: "CWE-78"

  - id: dangerous-eval
    patterns:
      - pattern: eval($INPUT)
      - pattern: exec($INPUT)
    message: |
      Code Injection: eval()/exec() dengan input yang tidak dipercaya sangat berbahaya.
      Dapat mengeksekusi kode Python arbitrer.
      Referensi: CWE-95
    languages: [python]
    severity: ERROR
    metadata:
      owasp: "A03:2021 - Injection"
      cwe: "CWE-95"

  # ============================================================
  # PATH TRAVERSAL RULES
  # ============================================================

  - id: path-traversal-open
    patterns:
      - pattern: open($BASE + $INPUT, ...)
      - pattern: open(f"...{$INPUT}...", ...)
    message: |
      Path Traversal: Input pengguna digunakan langsung dalam operasi file.
      Gunakan os.path.normpath() dan validasi hasilnya:
      filepath = os.path.normpath(os.path.join(base_dir, user_input))
      if not filepath.startswith(base_dir): raise ValueError("Access denied")
    languages: [python]
    severity: ERROR
    metadata:
      owasp: "A01:2021 - Broken Access Control"
      cwe: "CWE-22"

  # ============================================================
  # HARDCODED SECRETS RULES
  # ============================================================

  - id: hardcoded-password
    patterns:
      - pattern: $VAR = "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(password|passwd|pwd|secret|credential)
    message: |
      Hardcoded Secret terdeteksi: Credential/secret tidak boleh di-hardcode dalam kode.
      Gunakan environment variables: os.environ.get('SECRET_KEY')
      Atau gunakan secret manager seperti AWS Secrets Manager, HashiCorp Vault.
      Referensi: CWE-798
    languages: [python]
    severity: WARNING
    metadata:
      owasp: "A02:2021 - Cryptographic Failures"
      cwe: "CWE-798"

  - id: hardcoded-api-key
    patterns:
      - pattern: $VAR = "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(api_key|apikey|secret_key|private_key|auth_token)
    message: |
      Hardcoded API Key terdeteksi. Gunakan environment variables atau secret manager.
      Referensi: CWE-798
    languages: [python]
    severity: WARNING
    metadata:
      owasp: "A02:2021 - Cryptographic Failures"
      cwe: "CWE-798"

  - id: hardcoded-aws-key
    pattern: $VAR = "AKIA..."
    message: |
      AWS Access Key hardcoded terdeteksi!
      Hapus dari kode dan rotasi key segera.
      Gunakan IAM roles atau AWS credential provider chain.
    languages: [python, javascript, typescript]
    severity: ERROR
    metadata:
      owasp: "A02:2021 - Cryptographic Failures"
      cwe: "CWE-798"

  # ============================================================
  # WEAK CRYPTOGRAPHY RULES
  # ============================================================

  - id: weak-hash-md5
    patterns:
      - pattern: hashlib.md5(...)
      - pattern: hashlib.new('md5', ...)
    message: |
      Weak Hash: MD5 sudah tidak aman, terutama untuk hashing password.
      Untuk password: gunakan bcrypt, scrypt, atau Argon2.
      Untuk integrity check: gunakan SHA-256 atau SHA-3.
      Referensi: CWE-327
    languages: [python]
    severity: WARNING
    metadata:
      owasp: "A02:2021 - Cryptographic Failures"
      cwe: "CWE-327"

  - id: weak-hash-sha1
    patterns:
      - pattern: hashlib.sha1(...)
      - pattern: hashlib.new('sha1', ...)
    message: |
      Weak Hash: SHA1 sudah deprecated untuk penggunaan keamanan.
      Gunakan SHA-256 atau SHA-3.
      Referensi: CWE-327
    languages: [python]
    severity: WARNING
    metadata:
      owasp: "A02:2021 - Cryptographic Failures"
      cwe: "CWE-327"

  # ============================================================
  # INSECURE DESERIALIZATION RULES
  # ============================================================

  - id: insecure-pickle
    patterns:
      - pattern: pickle.loads($DATA)
      - pattern: pickle.load($FILE)
      - pattern: cPickle.loads($DATA)
    message: |
      Insecure Deserialization: pickle.loads() dengan data yang tidak dipercaya 
      dapat mengeksekusi kode arbitrer saat deserialisasi.
      Gunakan format yang aman seperti JSON, atau validasi sumber data.
      Referensi: CWE-502
    languages: [python]
    severity: ERROR
    metadata:
      owasp: "A08:2021 - Software and Data Integrity Failures"
      cwe: "CWE-502"

  - id: insecure-yaml-load
    pattern: yaml.load($DATA)
    message: |
      Insecure YAML: yaml.load() tanpa Loader yang aman dapat mengeksekusi kode.
      Gunakan yaml.safe_load() sebagai gantinya.
      Referensi: CWE-502
    languages: [python]
    severity: ERROR
    metadata:
      owasp: "A08:2021 - Software and Data Integrity Failures"
      cwe: "CWE-502"
